{% extends 'base.html' %}
{% block titulo %}Crear sección{% endblock %}
{% block contenido %}

<div class="migas">
  <a href="{{ url_for('profesor.panel') }}">Inicio</a> &rsaquo; Crear sección
</div>
<div class="pagina-titulo">Crear nueva sección</div>

<div class="bloque" style="max-width:520px;">
  <div class="bloque-cuerpo" style="padding:22px;">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-grupo">
        <label>Materia *</label>
        <select name="materia_id" required>
          <option value="">— Seleccione —</option>
          {% for m in materias %}
          <option value="{{ m.id }}">{{ m.nombre }} ({{ m.codigo }})</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-grupo">
        <label>Sección *</label>
        <select name="nombre_seccion" required>
          <option value="">— Seleccione —</option>
          {% for s in secciones_validas %}
          <option value="{{ s }}">{{ s }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-grupo">
        <label>Aula *</label>
        <input type="text" name="aula" placeholder="Ej: Lab-1, Aula-3" required>
      </div>

      <div class="form-grupo">
        <label>Día de clase *</label>
        <select name="dia_semana" required>
          <option value="">— Seleccione —</option>
          {% for d in dias %}
          <option value="{{ d }}">{{ d }}</option>
          {% endfor %}
        </select>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-grupo">
          <label>Hora inicio *</label>
          <input type="time" name="hora_inicio" required>
        </div>
        <div class="form-grupo">
          <label>Hora fin *</label>
          <input type="time" name="hora_fin" required>
        </div>
      </div>

      <div class="barra-acciones" style="margin-top:18px;">
        <a href="{{ url_for('profesor.panel') }}" class="btn btn-secundario">Cancelar</a>
        <button type="submit" class="btn btn-primario">Crear sección</button>
      </div>
    </form>
  </div>
</div>

{% endblock %}
